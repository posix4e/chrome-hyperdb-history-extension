name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: 'Playwright Tests'
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      
      - name: Run Playwright tests
        run: npx playwright test
      
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 30
          
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/
          retention-days: 30
          
      - name: Generate screenshot summary
        if: always()
        run: |
          echo "# Test Screenshots" > screenshot-summary.md
          echo "" >> screenshot-summary.md
          echo "## UI Tests" >> screenshot-summary.md
          echo "" >> screenshot-summary.md
          for i in {1..13}; do
            padded=$(printf "%02d" $i)
            files=$(find screenshots -name "$padded-*.png" | sort)
            for file in $files; do
              filename=$(basename "$file")
              echo "### $filename" >> screenshot-summary.md
              echo "![Screenshot]($file)" >> screenshot-summary.md
              echo "" >> screenshot-summary.md
            done
          done
          
          echo "## Mock Chrome API Tests" >> screenshot-summary.md
          echo "" >> screenshot-summary.md
          for i in {14..26}; do
            padded=$(printf "%02d" $i)
            files=$(find screenshots -name "$padded-*.png" | sort)
            for file in $files; do
              filename=$(basename "$file")
              echo "### $filename" >> screenshot-summary.md
              echo "![Screenshot]($file)" >> screenshot-summary.md
              echo "" >> screenshot-summary.md
            done
          done
      
      - name: Upload screenshot summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-summary
          path: screenshot-summary.md
          retention-days: 30