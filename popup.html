<!DOCTYPE html>
<html>
<head>
  <title>HyperDB History Sync</title>
  <style>
    body {
      width: 300px;
      padding: 10px;
      font-family: Arial, sans-serif;
    }
    .status {
      margin-top: 10px;
      padding: 5px;
      border-radius: 3px;
    }
    .connected {
      background-color: #d4edda;
      color: #155724;
    }
    .disconnected {
      background-color: #f8d7da;
      color: #721c24;
    }
    button {
      margin-top: 10px;
      padding: 5px 10px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
    }
    button:hover {
      background-color: #0069d9;
    }
    .peer-id {
      word-break: break-all;
      font-size: 12px;
      margin-top: 10px;
      padding: 5px;
      background-color: #f8f9fa;
      border-radius: 3px;
    }
    .device-info {
      margin-top: 10px;
      padding: 5px;
      background-color: #e2f0fb;
      border-radius: 3px;
      font-size: 12px;
    }
    .peer-count {
      margin-top: 10px;
      padding: 5px;
      background-color: #fff3cd;
      border-radius: 3px;
    }
    .history-container {
      margin-top: 15px;
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid #ddd;
      border-radius: 3px;
      padding: 5px;
    }
    .history-item {
      padding: 8px;
      border-bottom: 1px solid #eee;
      font-size: 12px;
    }
    .history-item:last-child {
      border-bottom: none;
    }
    .history-item .title {
      font-weight: bold;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .history-item .url {
      color: #0366d6;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .history-item .meta {
      display: flex;
      justify-content: space-between;
      color: #666;
      font-size: 10px;
      margin-top: 3px;
    }
    .loading {
      text-align: center;
      padding: 10px;
      color: #666;
    }
    .no-history {
      text-align: center;
      padding: 10px;
      color: #666;
      font-style: italic;
    }
  </style>
</head>
<body>
  <h2>HyperDB History Sync</h2>
  <div id="status" class="status disconnected">Disconnected</div>
  <div id="deviceInfo" class="device-info">Device: Unknown</div>
  <div id="peerId" class="peer-id"></div>
  <div id="peerCount" class="peer-count">Connected Peers: 0</div>
  <button id="syncNow">Sync Now</button>
  <button id="clearData">Clear Local Data</button>
  
  <h3>Browsing History</h3>
  <div id="historyContainer" class="history-container">
    <div class="loading">Loading history...</div>
  </div>
  
  <script src="js/popup.js"></script>
</body>
</html>
