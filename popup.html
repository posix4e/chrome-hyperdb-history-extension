<!DOCTYPE html>
<html>
<head>
  <title>HyperDB History Sync</title>
  <style>
    body {
      width: 300px;
      padding: 10px;
      font-family: Arial, sans-serif;
    }
    .status {
      margin-top: 10px;
      padding: 5px;
      border-radius: 3px;
    }
    .connected {
      background-color: #d4edda;
      color: #155724;
    }
    .disconnected {
      background-color: #f8d7da;
      color: #721c24;
    }
    button {
      margin-top: 10px;
      padding: 5px 10px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
    }
    button:hover {
      background-color: #0069d9;
    }
    .peer-id {
      word-break: break-all;
      font-size: 12px;
      margin-top: 10px;
      padding: 5px;
      background-color: #f8f9fa;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <h2>HyperDB History Sync</h2>
  <div id="status" class="status disconnected">Disconnected</div>
  <div id="peerId" class="peer-id"></div>
  <button id="syncNow">Sync Now</button>
  <button id="clearData">Clear Local Data</button>
  <script src="js/popup.js"></script>
</body>
</html>
